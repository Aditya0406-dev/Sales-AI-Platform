<!-- Structural Template matching your original dashboard layout -->
<div class="dashboard-container">
    <div class="main-title">AI SALES FORECASTING DASHBOARD</div>
    
    <!-- Sidebar metric card slots -->
    <div class="metrics-panel">
        <div class="metric-card">
            <div class="metric-label">Total Sales</div>
            <div class="metric-value">{{TOTAL_SALES}}</div>
        </div>
        
        <div class="metric-card">
            <div class="metric-label">Average Sales</div>
            <div class="metric-value">{{AVG_SALES}}</div>
        </div>
        
        <div class="metric-card">
            <div class="metric-label">Highest Sale</div>
            <div class="metric-value">{{HIGHEST_SALE}}</div>
        </div>
        
        <div class="metric-card">
            <div class="metric-label">Lowest Sale</div>
            <div class="metric-value">{{LOWEST_SALE}}</div>
        </div>
    </div>
</div>
